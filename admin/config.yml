backend:
  name: git-gateway
  branch: main # Branch to update (optional; defaults to master)

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "portfolio"
    label: "Portfolio Projects"
    files:
      - label: "Projects List"
        name: "projects_list"
        file: "data/projects.json"
        fields:
          - label: "Projects"
            name: "projects"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Category", name: "category", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Thumbnail Image", name: "thumbnail", widget: "image"}
              - {label: "Project Link", name: "link", widget: "string", required: false, hint: "External link for the project (optional)"}
              - {label: "Video Link", name: "videoLink", widget: "string", required: false, hint: "Paste a YouTube, Vimeo, or Google Drive video URL. Leave empty if no video."}

      - label: "Main Showreel"
        name: "showreel"
        file: "data/showreel.json"
        fields:
          - {label: "Showreel Title", name: "title", widget: "string"}
          - {label: "Thumbnail Image", name: "thumbnail", widget: "image"}
          - {label: "Video Link", name: "videoLink", widget: "string", required: false, hint: "Paste a YouTube, Vimeo, or Google Drive video URL for the main showreel."}
